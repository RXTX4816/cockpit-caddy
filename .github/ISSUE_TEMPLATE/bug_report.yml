name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]

body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: Brief description of the issue
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happens?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - Cockpit version: (e.g. 302)
        - Caddy version: `caddy version`
        - OS: (e.g. Fedora 39)
        - Browser: (e.g. Firefox 121)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Error Messages
      placeholder: Browser console errors, journalctl output, caddy logs, etc.
      render: plain
