name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Being Solved
      placeholder: What pain point or gap does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: How should this feature work? (brief description)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Approaches
      placeholder: Other ways this could be solved (if any)
