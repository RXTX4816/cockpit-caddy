name: Publish to AUR

on:
  release:
    types: [published]

jobs:
  aur:
    name: Publish AUR package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Get version and SHA256
        run: |
          VERSION_CLEAN="${GITHUB_REF_NAME#v}"
          echo "VERSION_CLEAN=${VERSION_CLEAN}" >> "$GITHUB_ENV"
          SHA256=$(curl -sL \
            "https://github.com/RXTX4816/cockpit-caddy/releases/download/${GITHUB_REF_NAME}/cockpit-caddy-${VERSION_CLEAN}.tar.gz.sha256" \
            | awk '{print $1}')
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"

      - name: Update PKGBUILD version and checksum
        run: |
          sed -i "s/^pkgver=.*/pkgver=${VERSION_CLEAN}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/sha256sums=('.*')/sha256sums=('${SHA256}')/" PKGBUILD

      - uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: cockpit-caddy
          pkgbuild: ./PKGBUILD
          commit_username: RXTX4816
          commit_email: RXTX4816@proton.me
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to ${{ env.VERSION_CLEAN }}"
          force_push: true
